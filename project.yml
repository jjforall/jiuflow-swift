name: JiuFlow
options:
  bundleIdPrefix: art.jiuflow
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: 5BV85JW8US
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: 6

targets:
  JiuFlow:
    type: application
    platform: iOS
    sources:
      - JiuFlow
    settings:
      base:
        INFOPLIST_FILE: JiuFlow/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jiuflow.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
